
name: 🤖 Robô Eterno 24/7

on:
  schedule:
    # Roda a cada 8 horas (00:00, 08:00, 16:00 UTC)
    - cron: '0 */8 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo site do GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar Repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar Dependências
        run: |
          pip install requests supabase
          # Adicione outras se o worker precisar no futuro

      - name: 🤖 Executar Vigilância
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python worker_standalone.py
